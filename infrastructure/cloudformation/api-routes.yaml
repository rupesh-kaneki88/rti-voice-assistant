AWSTemplateFormatVersion: '2010-09-09'
Description: 'RTI Voice Assistant - API Gateway Routes and Integrations'

Parameters:
  Environment:
    Type: String
    Default: dev
  
  HttpApiId:
    Type: String
    Description: HTTP API ID from main stack
  
  FastApiLambdaFunctionArn:
    Type: String
    Description: ARN of the FastAPI Lambda Function

Resources:
  # Integration for the single FastAPI Lambda Function
  FastApiLambdaIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApiId
      IntegrationType: AWS_PROXY
      IntegrationUri: !Ref FastApiLambdaFunctionArn
      PayloadFormatVersion: '2.0'
      TimeoutInMillis: 30000 # Max 30 seconds for Lambda proxy integration

  # Catch-all route for the FastAPI application
  # This routes all requests to the single Lambda function
  CatchAllFastApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApiId
      RouteKey: 'ANY /{proxy+}' # Catches all paths and methods
      Target: !Sub 'integrations/${FastApiLambdaIntegration}'

  

  # Lambda Permission for API Gateway to invoke the FastAPI Lambda
  FastApiLambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref FastApiLambdaFunctionArn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApiId}/*'

Outputs:
  ApiRoutesConfigured:
    Description: API Routes Configuration Status
    Value: 'Routes configured successfully'
