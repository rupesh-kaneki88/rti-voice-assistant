AWSTemplateFormatVersion: '2010-09-09'
Description: 'RTI Voice Assistant - Main Infrastructure Stack'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Environment name
  
  SessionTTLHours:
    Type: Number
    Default: "24"
    Description: Session TTL in hours for DPDPA compliance

  ApiRootPath:
    Type: String
    Default: ""
    Description: Base path for the API Gateway stage (e.g., /dev)

  

  GroqApiKey:
    Type: String
    NoEcho: true
    Description: API Key for Groq LLM

  GeminiApiKey:
    Type: String
    NoEcho: true
    Description: API Key for Gemini LLM

  

Resources:
  # DynamoDB Table for Sessions
  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'rti-sessions-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserIdIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: RTI-Voice-Assistant

  # DynamoDB Table for Consent Records
  ConsentTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'rti-consent-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: N
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: RTI-Voice-Assistant

  # S3 Bucket for Documents (24-hour lifecycle)
  DocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'rti-documents-${Environment}-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: DeleteAfter24Hours
            Status: Enabled
            ExpirationInDays: 1
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: RTI-Voice-Assistant

  # S3 Bucket for Knowledge Base (RTI rights, procedures)
  KnowledgeBaseBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'rti-knowledge-base-${Environment}-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: RTI-Voice-Assistant

  # KMS Key for Encryption
  EncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for RTI Voice Assistant data encryption
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: Allow Lambda to use the key
            Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action:
              - 'kms:Decrypt'
              - 'kms:Encrypt'
              - 'kms:GenerateDataKey'
            Resource: '*'
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: RTI-Voice-Assistant

  EncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/rti-voice-assistant-${Environment}'
      TargetKeyId: !Ref EncryptionKey

  # IAM Role for Lambda Execution
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'rti-lambda-execution-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
        - 'arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess'
        - 'arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly'
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'dynamodb:GetItem'
                  - 'dynamodb:PutItem'
                  - 'dynamodb:UpdateItem'
                  - 'dynamodb:DeleteItem'
                  - 'dynamodb:Query'
                  - 'dynamodb:Scan'
                Resource:
                  - !GetAtt SessionsTable.Arn
                  - !Sub '${SessionsTable.Arn}/index/*'
                  - !GetAtt ConsentTable.Arn
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:GetObject'
                  - 's3:PutObject'
                  - 's3:DeleteObject'
                Resource:
                  - !Sub '${DocumentsBucket.Arn}/*'
                  - !Sub '${KnowledgeBaseBucket.Arn}/*'
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'bedrock:InvokeModel'
                  - 'bedrock:InvokeModelWithResponseStream'
                Resource: '*' # Or specify the ARN of the models you want to use
        - PolicyName: PollyAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'polly:SynthesizeSpeech'
                Resource: '*'
        - PolicyName: TranscribeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'transcribe:StartStreamTranscription'
                  - 'transcribe:StartMedicalStreamTranscription'
                Resource: '*'
        - PolicyName: KMSAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'kms:Decrypt'
                  - 'kms:Encrypt'
                  - 'kms:GenerateDataKey'
                Resource: !GetAtt EncryptionKey.Arn
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: RTI-Voice-Assistant

  # CloudWatch Log Group
  ApplicationLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/rti-voice-assistant/${Environment}'
      RetentionInDays: 30

  # API Gateway HTTP API (cheaper and faster than REST API)
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub 'rti-voice-assistant-api-${Environment}'
      Description: HTTP API for RTI Voice Assistant
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - '*'
        MaxAge: 300
      Tags:
        Environment: !Ref Environment
        Application: RTI-Voice-Assistant

  # API Gateway Stage
  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: !Ref Environment
      AutoDeploy: true
      Description: !Sub '${Environment} stage for RTI Voice Assistant'
      DefaultRouteSettings:
        ThrottlingBurstLimit: 100
        ThrottlingRateLimit: 50
      Tags:
        Environment: !Ref Environment
        Application: RTI-Voice-Assistant

  FastApiLambdaStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: lambda.yaml # Assuming lambda.yaml is in the same directory
      Parameters:
        Environment: !Ref Environment
        LambdaExecutionRoleArn: !GetAtt LambdaExecutionRole.Arn
        SessionsTableName: !Ref SessionsTable
        DocumentsBucketName: !Ref DocumentsBucket
        KnowledgeBaseBucketName: !Ref KnowledgeBaseBucket
        KMSKeyId: !Ref EncryptionKey
        GroqApiKey: !Ref GroqApiKey
        GeminiApiKey: !Ref GeminiApiKey
        AwsRegion: !Ref AWS::Region
        ApiRootPath: !Ref ApiRootPath

  

Outputs:
  SessionsTableName:
    Description: DynamoDB Sessions Table Name
    Value: !Ref SessionsTable
    Export:
      Name: !Sub '${AWS::StackName}-SessionsTable'

  ConsentTableName:
    Description: DynamoDB Consent Table Name
    Value: !Ref ConsentTable
    Export:
      Name: !Sub '${AWS::StackName}-ConsentTable'

  DocumentsBucketName:
    Description: S3 Documents Bucket Name
    Value: !Ref DocumentsBucket
    Export:
      Name: !Sub '${AWS::StackName}-DocumentsBucket'

  KnowledgeBaseBucketName:
    Description: S3 Knowledge Base Bucket Name
    Value: !Ref KnowledgeBaseBucket
    Export:
      Name: !Sub '${AWS::StackName}-KnowledgeBaseBucket'

  LambdaExecutionRoleArn:
    Description: Lambda Execution Role ARN
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LambdaExecutionRole'

  EncryptionKeyId:
    Description: KMS Encryption Key ID
    Value: !Ref EncryptionKey
    Export:
      Name: !Sub '${AWS::StackName}-EncryptionKey'

  HttpApiId:
    Description: API Gateway HTTP API ID
    Value: !Ref HttpApi
    Export:
      Name: !Sub '${AWS::StackName}-HttpApiId'

  HttpApiUrl:
    Description: API Gateway HTTP API URL
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'
    Export:
      Name: !Sub '${AWS::StackName}-HttpApiUrl'
  
  HttpApiEndpoint:
    Description: API Gateway HTTP API Endpoint
    Value: !GetAtt HttpApi.ApiEndpoint
    Export:
      Name: !Sub '${AWS::StackName}-HttpApiEndpoint'

  FastApiLambdaFunctionArn:
    Description: ARN of the FastAPI Lambda Function
    Value: !GetAtt FastApiLambdaStack.Outputs.FastApiLambdaFunctionArn
